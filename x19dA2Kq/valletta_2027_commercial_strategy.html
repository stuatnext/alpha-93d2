function App(){
  const [currentSlide,setCurrentSlide]=useState(0);
  const Slide = slides[currentSlide];
  const next = () => setCurrentSlide(s => Math.min(slides.length-1, s+1));
  const prev = () => setCurrentSlide(s => Math.max(0, s-1));
  React.useEffect(()=>{
    const handler = e => {
      if(e.key === 'ArrowRight') next();
      if(e.key === 'ArrowLeft') prev();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  },[]);
  return (
    <div className="min-h-screen bg-slate-950 text-slate-50 font-sans flex flex-col">
      <main className="flex-1 flex flex-col max-w-7xl mx-auto w-full p-4 md:p-8">
        <Slide />
      </main>
      <footer className="border-t border-slate-900 bg-slate-950/80 p-4 flex items-center justify-between sticky bottom-0">
        <div className="flex items-center gap-3">
          <div className="w-9 h-7 rounded-lg bg-amber-500 text-slate-950 flex items-center justify-center font-black text-xs">€2.3M</div>
          <div>
            <div className="text-amber-500/90 text-xs md:text-sm font-bold">Valletta 2027 Commercial Strategy</div>
            <div className="text-slate-600 text-[10px] hidden md:block">Single target with retention, yield and sign-off controls</div>
          </div>
        </div>
        <div className="flex items-center gap-3 md:gap-4">
          <button onClick={prev} disabled={currentSlide===0} className="px-3 py-2 rounded-full bg-slate-900 hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">‹</button>
          <span className="text-slate-400 font-medium min-w-[4rem] text-center text-sm md:text-base">{currentSlide+1} / {slides.length}</span>
          <button onClick={next} disabled={currentSlide===slides.length-1} className="px-3 py-2 rounded-full bg-slate-900 hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">›</button>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
