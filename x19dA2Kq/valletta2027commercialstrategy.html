    // Force the classic runtime (React.createElement) so it works with UMD React.
    Babel.registerPreset('classic-react', { presets: [[Babel.availablePresets.react, { runtime: 'classic' }]] });

  <style>

    .table-container { -webkit-overflow-scrolling:touch; }

<div id="root"></div>

const { useState } = React;

function cn(...classes){ return classes.filter(Boolean).join(' '); }

const Card = ({children, className=""}) => <div className={cn("bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 shadow-xl", className)}>{children}</div>;
const Metric = ({label, value, sub, tone="text-amber-400", className=""}) => (
  <div className={cn("bg-slate-950 border border-slate-800 rounded-2xl p-4 md:p-5", className)}>
    <div className="text-[10px] md:text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">{label}</div>
    <div className={cn("text-2xl md:text-4xl font-black", tone)}>{value}</div>

);
const SectionTag = ({children}) => <div className="text-[10px] md:text-xs uppercase tracking-[0.22em] text-slate-500 font-black mb-4">{children}</div>;

const calibrationLog = [
  {
    forecast: "Sales partnerships target",

function ProductPricingTable({title, subtitle, rows}){
  const shock = (change) => {
    const match = String(change || '').match(/\+([0-9]+)/);
    return match && parseInt(match[1], 10) > 20;
  };
  return (
    <div className="flex-1 flex flex-col overflow-y-auto pb-8">
      <SectionTag>Appendix · 2027 Product Pricing</SectionTag>
      <h2 className="text-2xl md:text-3xl font-bold mb-2">{title}</h2>
      <p className="text-slate-400 mb-4 md:mb-6 text-base md:text-lg">{subtitle}</p>
      <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex-1 flex flex-col shadow-xl">
        <div className="overflow-x-auto w-full flex-1 table-container">
          <table className="w-full text-left text-[11px] md:text-sm min-w-[1050px]">
            <thead className="bg-slate-950 border-b border-slate-800 text-slate-400 uppercase">
              <tr>
                <th className="p-3 md:p-4 font-medium min-w-[220px]">Product</th>
                <th className="p-3 md:p-4 font-medium text-right whitespace-nowrap">Rebook</th>
                <th className="p-3 md:p-4 font-medium text-right whitespace-nowrap">2027 List</th>
                <th className="p-3 md:p-4 font-medium text-right whitespace-nowrap">Change</th>
                <th className="p-3 md:p-4 font-medium text-right whitespace-nowrap">Floor</th>
                <th className="p-3 md:p-4 font-medium min-w-[170px]">2026 Actual</th>
                <th className="p-3 md:p-4 font-medium min-w-[320px]">Action / Notes</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-800/50">
              {rows.map((r,i)=>{
                if(r.section){
                  return <tr key={i} className="bg-slate-800/80 border-y border-slate-700"><td colSpan="7" className="p-3 font-bold text-slate-200 text-[10px] md:text-xs tracking-wider uppercase">{r.section}</td></tr>;
                }
                return (
                  <tr key={i} className={cn(r.retired ? "bg-rose-950/10 opacity-75" : "hover:bg-slate-800/30", "transition-colors")}>
                    <td className="p-3 md:p-4 font-semibold text-slate-200">{r.product}</td>
                    <td className="p-3 md:p-4 font-mono text-slate-400 text-right whitespace-nowrap">{r.rebook}</td>
                    <td className={cn("p-3 md:p-4 font-mono text-right whitespace-nowrap", r.retired ? "text-rose-300" : "text-amber-400")}>{r.list}</td>
                    <td className={cn("p-3 md:p-4 font-mono text-right whitespace-nowrap", shock(r.change) ? "text-amber-300 font-bold" : "text-slate-400")}>{r.change}{shock(r.change) ? " ⚠" : ""}</td>
                    <td className="p-3 md:p-4 font-mono text-emerald-400/80 text-right whitespace-nowrap">{r.floor}</td>
                    <td className="p-3 md:p-4 text-slate-400 text-[10px] md:text-xs leading-relaxed">{r.actual}</td>
                    <td className="p-3 md:p-4 text-slate-400 text-[10px] md:text-xs leading-relaxed">{r.notes}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      <p className="text-[10px] md:text-xs text-slate-500 italic mt-3">Floors are deal-desk controls, not sales-pitch prices. Rebook means 2026 price for identical scope only, inside the approved rebooking window.</p>
    </div>
  );
}

  SlidePricingRules,
  SlideProofProgramme
];

function App(){
  const [currentSlide,setCurrentSlide]=useState(0);
  const Slide = slides[currentSlide];
  const next = () => setCurrentSlide(s => Math.min(slides.length-1, s+1));
  const prev = () => setCurrentSlide(s => Math.max(0, s-1));
  React.useEffect(()=>{
    const handler = e => {
      if(e.key === 'ArrowRight') next();
      if(e.key === 'ArrowLeft') prev();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  },[]);
  return (
    <div className="min-h-screen bg-slate-950 text-slate-50 font-sans flex flex-col">
      <main className="flex-1 flex flex-col max-w-7xl mx-auto w-full p-4 md:p-8">
        <Slide />
      </main>
      <footer className="border-t border-slate-900 bg-slate-950/80 p-4 flex items-center justify-between sticky bottom-0">
        <div className="flex items-center gap-3">
          <div className="w-9 h-7 rounded-lg bg-amber-500 text-slate-950 flex items-center justify-center font-black text-xs">€2.2M</div>
          <div>
            <div className="text-amber-500/90 text-xs md:text-sm font-bold">Valletta 2027 Commercial Strategy</div>
            <div className="text-slate-600 text-[10px] hidden md:block">One sales target, justified by the trend, with retention and sign-off controls</div>
          </div>
        </div>
        <div className="flex items-center gap-3 md:gap-4">
          <button onClick={prev} disabled={currentSlide===0} className="px-3 py-2 rounded-full bg-slate-900 hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">‹</button>
          <span className="text-slate-400 font-medium min-w-[4rem] text-center text-sm md:text-base">{currentSlide+1} / {slides.length}</span>
          <button onClick={next} disabled={currentSlide===slides.length-1} className="px-3 py-2 rounded-full bg-slate-900 hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">›</button>
        </div>
      </footer>
    </div>
  );
}
