<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Valletta 2027 Commercial Strategy</title>

  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Load React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Load Babel to compile JSX in the browser -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #f8fafc; }
    /* Beautiful scrollbar for horizontal tables */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Prevent table squishing globally */
    .table-container {
        -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- ICON COMPONENTS ---
    const Icon = ({ p, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: p }} />
    );
    const ChevronLeft = (props) => <Icon p='<path d="m15 18-6-6 6-6"/>' {...props} />;
    const ChevronRight = (props) => <Icon p='<path d="m9 18 6-6-6-6"/>' {...props} />;
    const Target = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>' {...props} />;
    const ShieldCheck = (props) => <Icon p='<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>' {...props} />;
    const TrendingUp = (props) => <Icon p='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' {...props} />;
    const TrendingDown = (props) => <Icon p='<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>' {...props} />;
    const Users = (props) => <Icon p='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' {...props} />;
    const Layers = (props) => <Icon p='<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>' {...props} />;
    const Package = (props) => <Icon p='<line x1="16.5" x2="7.5" y1="9.4" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/>' {...props} />;
    const Award = (props) => <Icon p='<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>' {...props} />;
    const Clock = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' {...props} />;
    const AlertCircle = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>' {...props} />;
    const CheckCircle2 = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>' {...props} />;
    const FileText = (props) => <Icon p='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' {...props} />;
    const PieChart = (props) => <Icon p='<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>' {...props} />;
    const ArrowRight = (props) => <Icon p='<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>' {...props} />;
    const Diamond = (props) => <Icon p='<path d="M2.7 10.3a2.41 2.41 0 0 0 0 3.41l7.59 7.59a2.41 2.41 0 0 0 3.42 0l7.59-7.59a2.41 2.41 0 0 0 0-3.41l-7.59-7.59a2.41 2.41 0 0 0-3.42 0Z"/>' {...props} />;
    const CheckSquare = (props) => <Icon p='<rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/>' {...props} />;
    const XCircle = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>' {...props} />;
    const TicketIcon = (props) => <Icon p='<path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/>' {...props} />;
    const Calculator = (props) => <Icon p='<rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>' {...props} />;
    const Scan = (props) => <Icon p='<path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" x2="17" y1="12" y2="12"/>' {...props} />;

    // Utility for conditional classes
    function cn(...classes) {
      return classes.filter(Boolean).join(' ');
    }

    // --- CORE PRESENTATION SLIDES ---

    function SlideTitle() {
      return (
        <div className="flex-1 flex flex-col items-center justify-center text-center animate-in fade-in duration-500">
          <div className="mb-10">
            <div className="w-20 h-20 md:w-24 md:h-24 bg-gradient-to-br from-amber-400 to-yellow-600 rounded-2xl flex items-center justify-center mx-auto shadow-2xl shadow-amber-900/50 mb-6">
              <Target className="w-10 h-10 md:w-12 md:h-12 text-slate-950" />
            </div>
          </div>
          <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 md:mb-6 bg-gradient-to-br from-white to-slate-400 bg-clip-text text-transparent px-2">
            Valletta 2027 Commercial Strategy
          </h1>
          <p className="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-12 px-4">
            A stabilisation-year framework: protect rebooks, repair churn, prove sponsor value, and grow yield without price shock.
          </p>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-3xl w-full px-4">
            <div className="bg-slate-900 border border-amber-800/50 rounded-2xl p-4">
              <div className="text-[10px] md:text-xs text-slate-500 uppercase tracking-widest mb-1">Sales Partnership Target</div>
              <div className="text-2xl md:text-3xl font-black text-amber-400">€2.30M</div>
            </div>
            <div className="bg-slate-900 border border-indigo-800/50 rounded-2xl p-4">
              <div className="text-[10px] md:text-xs text-slate-500 uppercase tracking-widest mb-1">Marketing Ticket Target</div>
              <div className="text-2xl md:text-3xl font-black text-indigo-400">€300K</div>
            </div>
            <div className="bg-slate-900 border border-emerald-800/50 rounded-2xl p-4">
              <div className="text-[10px] md:text-xs text-slate-500 uppercase tracking-widest mb-1">Combined View</div>
              <div className="text-2xl md:text-3xl font-black text-emerald-400">~€2.60M</div>
            </div>
          </div>
          <p className="text-[10px] md:text-xs text-slate-600 mt-10 px-4">Built from 2026 actuals, the 2027 ops product list and budget projection, NYC 2027 benchmarks, and the June 2026 product review.</p>
        </div>
      );
    }

    function SlideExecutiveSummary() {
      return (
        <div className="flex-1 flex flex-col animate-in fade-in duration-500 overflow-y-auto pr-2 md:pr-4 pb-8">
          <h2 className="text-2xl md:text-3xl font-bold mb-2">Executive Summary</h2>
          <p className="text-slate-400 mb-6 md:mb-8 text-base md:text-lg">The 2027 commercial architecture: from price escalation to value-led stabilisation.</p>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 flex-1">
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 flex flex-col">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 bg-rose-900/30 rounded-lg flex items-center justify-center border border-rose-800/50">
                  <TrendingDown className="w-5 h-5 text-rose-400" />
                </div>
                <h3 className="text-lg md:text-xl font-bold text-slate-200">Stabilisation, Not Escalation</h3>
              </div>
              <p className="text-slate-400 text-sm md:text-base leading-relaxed mb-4">
                Two years of compound price increases (over 50% across 2024-26) drove a <strong>57% partner churn</strong> and dropped value retention from 93% to 69%. 2027 holds the average catalogue movement to <strong>~15%</strong>, concentrates increases where demand is proven, holds unproven items at 0%, and retires failed SKUs.
              </p>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 flex flex-col">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 bg-amber-900/30 rounded-lg flex items-center justify-center border border-amber-800/50">
                  <Layers className="w-5 h-5 text-amber-400" />
                </div>
                <h3 className="text-lg md:text-xl font-bold text-slate-200">Value-Led Pricing Architecture</h3>
              </div>
              <p className="text-slate-400 text-sm md:text-base leading-relaxed mb-4">
                A 4-part rate card: <strong>Rebook</strong> (2026 price, identical scope only), <strong>2027 List</strong> (public anchor for new buyers and upgrades), <strong>Floor</strong> (no quote below it without director approval), and <strong>Cost-Led Quote</strong> for side events, takeovers and bespoke activations where venue, F&amp;B and production costs move.
              </p>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 flex flex-col">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 bg-emerald-900/30 rounded-lg flex items-center justify-center border border-emerald-800/50">
                  <Scan className="w-5 h-5 text-emerald-400" />
                </div>
                <h3 className="text-lg md:text-xl font-bold text-slate-200">Churn Repair Through Proof</h3>
              </div>
              <p className="text-slate-400 text-sm md:text-base leading-relaxed mb-4">
                Every increase ships with evidence. Lead retrieval is now <strong>bundled into every stand</strong>, session badge scanning measures sponsored-room audiences, and footfall, seniority and reach reporting becomes standard. We sell data, not assertions — the gap that lost us Pragmatic Play and BetConstruct.
              </p>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 flex flex-col">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 bg-yellow-900/30 rounded-lg flex items-center justify-center border border-yellow-800/50">
                  <ShieldCheck className="w-5 h-5 text-yellow-400" />
                </div>
                <h3 className="text-lg md:text-xl font-bold text-slate-200">Margin Defence &amp; Cost Discipline</h3>
              </div>
              <p className="text-slate-400 text-sm md:text-base leading-relaxed mb-4">
                The 2027 cost base is capped at <strong>+10%</strong> (the projection lands at +8%), profit must grow <strong>10-15%</strong>, and discounting is governed: 10% single-deal cap, 15% cumulative cap. Negotiation flexes via <strong>bundles</strong>, not per-deal deliverable swaps that ops cannot track.
              </p>
            </div>
          </div>
        </div>
      );
    }

    function SlideWhatChanged() {
      return (
        <div className="flex-1 flex flex-col animate-in fade-in duration-500 overflow-y-auto pr-2 md:pr-4 pb-8">
          <h2 className="text-2xl md:text-3xl font-bold mb-2">What the 2026 Post-Mortem Changed</h2>
          <p className="text-slate-400 mb-6 md:mb-8 text-base md:text-lg">Key shifts from the June 2026 product review that reshape the original pricing proposal.</p>

          <div className="space-y-4">
            <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-5 flex gap-4">
              <div className="mt-1"><AlertCircle className="w-5 h-5 text-rose-500" /></div>
              <div>
                <h4 className="text-slate-200 font-bold mb-1">The Churn Bill Is Now Quantified</h4>
                <p className="text-slate-400 text-sm">We lost 57% of partners from 2025 to 2026 and value retention collapsed from 93% to 69%. Roughly <strong>€221k</strong> walked at the top (Zanada, Evolution, Pragmatic Play, SofterBet, plus a €75k BetConstruct reduction) and <strong>€233k</strong> churned across small stand accounts — more than the four big losses combined. Both ends trace directly to unjustified price increases.</p>
              </div>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-5 flex gap-4">
              <div className="mt-1"><AlertCircle className="w-5 h-5 text-amber-500" /></div>
              <div>
                <h4 className="text-slate-200 font-bold mb-1">Price-Shock Inventory Gets Reset, Not Re-Listed</h4>
                <p className="text-slate-400 text-sm">Both €100k rooftop exclusives blew out their sponsors and ended unsold. They move to <strong>POA / cost-led bespoke takeovers</strong> rather than carrying a failed list price. Stand pricing takes a deliberately restrained +24% after the +40% hike churned the hall. You don't get two bites of the cherry on a price increase.</p>
              </div>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-5 flex gap-4">
              <div className="mt-1"><AlertCircle className="w-5 h-5 text-amber-500" /></div>
              <div>
                <h4 className="text-slate-200 font-bold mb-1">Stabilisation Directive From Sales Leadership</h4>
                <p className="text-slate-400 text-sm">2024-25 averaged +28% and 2025-26 added +15% — a compound increase of over 50% in two years. 2027 is a stabilisation year: <strong>average movement ~15%</strong>, with some reductions and holds factored in. Increases above 20% require a buyer-facing value rationale; above 40% require repositioning and approval.</p>
              </div>
            </div>

            <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-5 flex gap-4">
              <div className="mt-1"><CheckCircle2 className="w-5 h-5 text-emerald-500" /></div>
              <div>
                <h4 className="text-slate-200 font-bold mb-1">Scope Additions Agreed on the Review Call</h4>
                <p className="text-slate-400 text-sm">Malta Enterprise / Malta Vision 2050 revenue now <strong>counts toward the sales target</strong> (it carries real deliverables). The ticket target rises from €188k achieved to <strong>€300k</strong>. Lead retrieval is included in exhibitor packages. The catalogue gets restructured and bundled rather than extended — no flood of new products.</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SlideChurnReality() {
      return (
        <div className="flex-1 flex flex-col animate-in fade-in duration-500 overflow-y-auto pr-2 md:pr-4 pb-8">
          <h2 className="text-2xl md:text-3xl font-bold mb-6 md:mb-8">The Churn Reality</h2>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-8 flex flex-col">
              <div className="flex items-center gap-3 mb-4 md:mb-6">
                <PieChart className="w-6 h-6 text-slate-400" />
                <h3 className="text-lg md:text-xl font-semibold">What 2026 Actually Cost Us</h3>
              </div>

              <div className="grid grid-cols-2 gap-3 mb-6">
                <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 text-center">
                  <div className="text-3xl md:text-4xl font-black text-rose-400 mb-1">57%</div>
                  <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Partner Churn '25→'26</div>
                </div>
                <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 text-center">
                  <div className="text-3xl md:text-4xl font-black text-rose-400 mb-1">69%</div>
                  <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Value Retained (was 93%)</div>
                </div>
                <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 text-center">
                  <div className="text-2xl md:text-3xl font-black text-rose-400 mb-1">€221k</div>
                  <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Lost at the Top End</div>
                </div>
                <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 text-center">
                  <div className="text-2xl md:text-3xl font-black text-rose-400 mb-1">€233k</div>
                  <div className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Lost Across Small Stands</div>
                </div>
              </div>

              <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 mt-auto">
                <p className="text-xs md:text-sm text-slate-400 leading-relaxed">
                  New business replaced existing revenue rather than compounding on top of it — and refilling the hall consumed sales bandwidth that should have gone to focus events and unsold premium inventory. <strong className="text-slate-300">Repeating that cycle is not sustainable.</strong>
                </p>
              </div>
            </div>

            <div className="bg-yellow-950/30 border border-yellow-900/50 rounded-2xl p-5 md:p-8 flex flex-col relative overflow-hidden">
              <div className="absolute top-0 right-0 w-48 h-48 md:w-64 md:h-64 bg-yellow-500/10 blur-3xl rounded-full -translate-y-1/2 translate-x-1/2" />
              <div className="w-10 h-10 md:w-12 md:h-12 bg-yellow-900/50 rounded-xl flex items-center justify-center mb-4 md:mb-6 border border-yellow-800/50">
                <ShieldCheck className="w-5 h-5 md:w-6 md:h-6 text-yellow-400" />
              </div>
              <h3 className="text-lg md:text-xl font-bold mb-4 text-yellow-100">How We Defend 2027</h3>
              <ul className="space-y-4 text-yellow-200/80 text-sm md:text-base flex-1">
                <li className="flex items-start gap-3">
                  <div className="w-1.5 h-1.5 rounded-full bg-yellow-500 mt-2 shrink-0" />
                  <p><strong className="text-yellow-100">Protect the rebook base:</strong> identical scope renews at 2026 pricing inside the rebook window (one month post-event, flexing to mid-August). Positive signals are already in: MyGamingConsultants, Hammer, LumaLinks, JibTelecom, Tequity and others want to return — if we don't shock them again.</p>
                </li>
                <li className="flex items-start gap-3">
                  <div className="w-1.5 h-1.5 rounded-full bg-yellow-500 mt-2 shrink-0" />
                  <p><strong className="text-yellow-100">Win the calendar:</strong> SiGMA, SBC and now MAC compress the same buyer budgets. Early rebook conversion and a sharpened value proposition versus volume events is the front line.</p>
                </li>
                <li className="flex items-start gap-3">
                  <div className="w-1.5 h-1.5 rounded-full bg-yellow-500 mt-2 shrink-0" />
                  <p><strong className="text-yellow-100">Grow density, not volume:</strong> the venue caps near 6,000 attendees. Growth is demonstrated through delegate seniority and quality within that cap — which is exactly the data the proof-of-value programme captures.</p>
                </li>
              </ul>
            </div>
          </div>
        </div>
      );
    }

    function SlideCostBase() {
      return (
        <div className="flex-1 flex flex-col animate-in fade-in duration-500 overflow-y-auto pr-2 md:pr-4 pb-8">
          <h2 className="text-2xl md:text-3xl font-bold mb-2">Cost Base &amp; Margin Hurdle</h2>
          <p className="text-slate-400 mb-6 md:mb-8 text-base md:text-lg">The 2027 budget projection holds inside the +10% cost cap. Profit must grow 10-15%.</p>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8 mb-6 flex-1">

            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 shadow-xl flex flex-col">
              <h3 className="text-lg md:text-xl font-bold mb-4 md:mb-6 text-slate-200">The 2027 Event Cost Base</h3>

              <div className="space-y-4 mb-6 md:mb-8">
                <div className="flex justify-between items-center pb-2 border-b border-slate-800">
                  <span className="text-slate-400 text-sm md:text-base">Event costs — 2025 actual</span>
                  <span className="text-slate-200 font-mono text-sm md:text-base">€955,816</span>
                </div>
                <div className="flex justify-between items-center pb-2 border-b border-slate-800">
                  <span className="text-slate-400 text-sm md:text-base">Event costs — 2026 budget</span>
                  <span className="text-slate-200 font-mono text-sm md:text-base">€1,173,700</span>
                </div>
                <div className="flex justify-between items-center pb-2 border-b border-slate-800">
                  <span className="text-slate-400 text-sm md:text-base">Event costs — 2027 projection <span className="text-emerald-400 text-xs font-bold">(+8%)</span></span>
                  <span className="text-slate-200 font-mono text-sm md:text-base">€1,267,998</span>
                </div>
                <div className="flex justify-between items-center pb-2 border-b border-slate-800">
                  <span className="text-slate-400 text-sm md:text-base">Sales commission (5% existing / 10% new)</span>
                  <span className="text-slate-200 font-mono text-sm md:text-base">€165,000</span>
                </div>
                <div className="flex justify-between items-center pt-2">
                  <span className="text-yellow-400 font-bold uppercase tracking-wider text-xs md:text-sm">2027 Cost Base Incl. Commission</span>
                  <span className="text-yellow-400 font-bold text-lg md:text-xl font-mono">€1,432,998</span>
                </div>
              </div>

              <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-auto">
                <p className="text-xs md:text-sm text-slate-400 leading-relaxed">
                  The +8% projection sits inside the <strong className="text-slate-200">+10% hard cap</strong> set by Finance. 2026 invoices are still landing, so the base may move slightly. Salaries and central overhead are held separately — Ana to confirm for the full P&amp;L view.
                </p>

      SlideScorecard,
      SlideApprovalRequested,
      SlidePricingRules,
      SlideDealDesk,
      SlideTiers,
      SlideBundles,
      SlideValueProof,
      SlideRebooking,
      SlideMarginWatch,
      SlideCataloguePremium,
      SlideCatalogueContent,
      SlideCatalogueBrandingNetworking
    ];

    function App() {
      const [currentSlide, setCurrentSlide] = useState(0);

      const next = () => setCurrentSlide(s => Math.min(slides.length - 1, s + 1));
      const prev = () => setCurrentSlide(s => Math.max(0, s - 1));

      const Slide = slides[currentSlide];

      return (
        <div className="min-h-screen bg-slate-950 text-slate-50 font-sans flex flex-col">
          <main className="flex-1 flex flex-col max-w-7xl mx-auto w-full p-4 md:p-8">
            <Slide />
          </main>

          <footer className="border-t border-slate-900 bg-slate-950/50 p-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <Target className="w-5 h-5 md:w-6 md:h-6 text-amber-500" />
              <div className="text-amber-500/80 text-xs md:text-sm font-medium">Valletta 2027 Commercial Strategy</div>
            </div>
            <div className="flex items-center gap-4">
              <button
                onClick={prev}
                disabled={currentSlide === 0}
                className="p-2 rounded-full hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
              >
                <ChevronLeft className="w-5 h-5 md:w-6 md:h-6" />
              </button>
              <span className="text-slate-400 font-medium min-w-[3rem] text-center text-sm md:text-base">
                {currentSlide + 1} / {slides.length}
              </span>
              <button
                onClick={next}
                disabled={currentSlide === slides.length - 1}
                className="p-2 rounded-full hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
              >
                <ChevronRight className="w-5 h-5 md:w-6 md:h-6" />
              </button>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
