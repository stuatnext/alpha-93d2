<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEXTPredict 2026 Commercial Strategy</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #111111; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #ffcf33; }
    .table-container { -webkit-overflow-scrolling: touch; }
    .slide-enter { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const Icon = ({ p, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: p }} />
    );

    const ChevronLeft = (props) => <Icon p='<path d="m15 18-6-6 6-6"/>' {...props} />;
    const ChevronRight = (props) => <Icon p='<path d="m9 18 6-6-6-6"/>' {...props} />;
    const Target = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>' {...props} />;
    const ShieldCheck = (props) => <Icon p='<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>' {...props} />;
    const TrendingUp = (props) => <Icon p='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' {...props} />;
    const TrendingDown = (props) => <Icon p='<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>' {...props} />;
    const Users = (props) => <Icon p='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' {...props} />;
    const Layers = (props) => <Icon p='<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>' {...props} />;
    const Package = (props) => <Icon p='<line x1="16.5" x2="7.5" y1="9.4" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/>' {...props} />;
    const Award = (props) => <Icon p='<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>' {...props} />;
    const AlertCircle = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>' {...props} />;
    const CheckCircle2 = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>' {...props} />;
    const FileText = (props) => <Icon p='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' {...props} />;
    const ArrowRight = (props) => <Icon p='<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>' {...props} />;
    const Diamond = (props) => <Icon p='<path d="M2.7 10.3a2.41 2.41 0 0 0 0 3.41l7.59 7.59a2.41 2.41 0 0 0 3.42 0l7.59-7.59a2.41 2.41 0 0 0 0-3.41l-7.59-7.59a2.41 2.41 0 0 0-3.42 0Z"/>' {...props} />;
    const CheckSquare = (props) => <Icon p='<rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/>' {...props} />;
    const XCircle = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>' {...props} />;
    const TicketIcon = (props) => <Icon p='<path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/>' {...props} />;
    const Calculator = (props) => <Icon p='<rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>' {...props} />;
    const Globe = (props) => <Icon p='<circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>' {...props} />;
    const Activity = (props) => <Icon p='<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>' {...props} />;
    const Lock = (props) => <Icon p='<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>' {...props} />;

    function cn(...classes) { return classes.filter(Boolean).join(' '); }

    const SectionLabel = ({ children }) => <div className="text-[10px] md:text-xs font-black text-gray-500 uppercase tracking-widest mb-4">{children}</div>;

    const SlideFrame = ({ eyebrow, title, subtitle, children }) => (
      <div className="flex-1 flex flex-col slide-enter overflow-y-auto pr-2 md:pr-4 pb-8">
        {eyebrow && <SectionLabel>{eyebrow}</SectionLabel>}
        {title && <h2 className="text-2xl md:text-3xl font-bold mb-2 text-white">{title}</h2>}
        {subtitle && <p className="text-gray-400 mb-6 md:mb-8 text-base md:text-lg">{subtitle}</p>}
        {children}
      </div>
    );

    const Card = ({ icon: IconComp, title, children, className, accent = false, danger = false }) => (
      <div className={cn(
        "bg-[#232323] border rounded-2xl p-5 md:p-6 flex flex-col shadow-xl relative overflow-hidden",
        accent ? "border-[#ffcf33]/40" : danger ? "border-rose-500/30" : "border-[#444]",
        className
      )}>
        {accent && <div className="absolute top-0 left-0 w-1.5 h-full bg-[#ffcf33]"></div>}
        {danger && <div className="absolute top-0 left-0 w-1.5 h-full bg-rose-500"></div>}
        {title && (
          <div className="flex items-center gap-3 mb-4">
            {IconComp && <div className={cn("w-10 h-10 rounded-lg flex items-center justify-center border", accent ? "bg-[#ffcf33]/10 border-[#ffcf33]/30" : danger ? "bg-rose-500/10 border-rose-500/30" : "bg-[#111] border-[#444]") }><IconComp className={cn("w-5 h-5", accent ? "text-[#ffcf33]" : danger ? "text-rose-400" : "text-gray-400")} /></div>}
            <h3 className="text-lg md:text-xl font-bold text-white">{title}</h3>
          </div>
        )}
        {children}
      </div>
    );

    const MetricRow = ({ label, value, valueClass = "text-white", note }) => (
      <div className="flex justify-between items-start gap-4 pb-2 border-b border-[#444] last:border-b-0">
        <div>
          <div className="text-gray-400 text-xs md:text-sm">{label}</div>
          {note && <div className="text-[10px] text-gray-500 mt-0.5">{note}</div>}
        </div>
        <div className={cn("font-mono text-right text-sm md:text-base font-bold", valueClass)}>{value}</div>
      </div>
    );

    const Bullet = ({ children, color = "text-[#ffcf33]" }) => (
      <li className="flex items-start gap-3">
        <span className={cn("mt-1.5 w-1.5 h-1.5 rounded-full shrink-0", color === "text-rose-400" ? "bg-rose-400" : color === "text-emerald-400" ? "bg-emerald-400" : "bg-[#ffcf33]")}></span>
        <span>{children}</span>
      </li>
    );

    const NumberedPoint = ({ n, children }) => (
      <div className="flex items-start gap-3 bg-[#111] p-4 rounded-xl border border-[#333]">
        <div className="w-6 h-6 rounded-full bg-[#ffcf33]/20 flex items-center justify-center shrink-0 text-[#ffcf33] font-bold text-xs">{n}</div>
        <p className="text-sm text-gray-300 leading-tight">{children}</p>
      </div>
    );

    const SimpleTable = ({ headers, rows, minWidth = "600px" }) => (
      <div className="overflow-x-auto w-full table-container">
        <table className="w-full text-left text-xs md:text-sm" style={{ minWidth }}>
          <thead className="border-b border-[#444] text-gray-400 uppercase tracking-wider text-[10px]">
            <tr>{headers.map((h, i) => <th key={i} className={cn("p-3 font-medium", h.align === "right" && "text-right", h.className)}>{h.label}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-[#444] text-gray-300">
            {rows.map((row, i) => (
              <tr key={i} className={cn(row.className, "hover:bg-[#111] transition-colors")}>
                {row.cells.map((cell, j) => <td key={j} className={cn("p-3", cell.align === "right" && "text-right", cell.className)}>{cell.value}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );

    function SlideTitle() {
      return (
        <div className="flex-1 flex flex-col items-center justify-center text-center slide-enter">
          <div className="mb-10 relative">
            <div className="absolute inset-0 bg-[#ffcf33] blur-[80px] opacity-20 rounded-full"></div>
            <div className="w-20 h-20 md:w-24 md:h-24 bg-gradient-to-br from-[#ffcf33] to-amber-600 rounded-2xl flex items-center justify-center mx-auto shadow-2xl shadow-[#ffcf33]/20 mb-6 relative z-10">
              <Globe className="w-10 h-10 md:w-12 md:h-12 text-[#232323]" />
            </div>
          </div>
          <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 md:mb-6 text-white px-2">
            NEXTPredict 2026<br />
            <span className="text-[#ffcf33]">Commercial Strategy</span>
          </h1>
          <p className="text-lg md:text-xl text-gray-400 max-w-3xl mx-auto mb-12 px-4">
            Institutionalising prediction markets. Securing the Manhattan premium. Protecting core NEXT.io revenue while testing a new category.
          </p>
        </div>
      );
    }

    function SlideExecutiveSummary() {
      return (
        <SlideFrame title="Executive Summary" subtitle="Establishing the definitive global summit for prediction markets, with realistic year-one controls.">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 flex-1">
            <Card icon={ShieldCheck} title="Category Leadership" accent>
              <p className="text-gray-400 text-sm md:text-base leading-relaxed">
                NEXTPredict is a first-year event, but it is not a small community meetup. It is positioned as the premium institutional category leader across prediction markets, information markets, event-driven derivatives and market structure.
              </p>
            </Card>
            <Card icon={Package} title="Premium Valuation" accent>
              <p className="text-gray-400 text-sm md:text-base leading-relaxed">
                Pricing is ambitious and must be defended by enterprise-scale delivery, operator / platform / institutional buyer density, NYC market context and category scarcity. We are pricing for B2B budgets, not meetup economics.
              </p>
            </Card>
            <Card icon={Target} title="Commercial Realism" accent>
              <p className="text-gray-400 text-sm md:text-base leading-relaxed">
                The base market validation forecast is <strong className="text-[#ffcf33]">€1.35M</strong> against a maximum catalogue ceiling of <strong className="text-[#ffcf33]">€2.890M</strong>. The <strong className="text-[#ffcf33]">€1.8M</strong> stretch target is achievable only with tight GTM execution.
              </p>
            </Card>
            <Card icon={TrendingUp} title="Integrated Revenue & Strategic Value" accent>
              <p className="text-gray-400 text-sm md:text-base leading-relaxed">
                Ticket revenue is marketing-led. B2B revenue is sales-led. Strategic launch value must also be measured through sponsor calibre, buyer density, media reach, renewal probability, 2027 pipeline and category ownership signals.
              </p>
            </Card>
          </div>
          <div className="mt-6 pt-4 border-t border-[#333] text-xs text-gray-500 italic text-center shrink-0 w-full">
            This board framework converts the original commercial draft into a controlled launch model covering revenue, ticket strategy, margin protection, GTM execution, pipeline quality, governance, resource control and approval discipline.
          </div>
        </SlideFrame>
      );
    }

    function SlideCommercialModel() {
      return (
        <SlideFrame title="Commercial Model" subtitle="Key principles driving the 2026 forecast.">
          <div className="space-y-4">
            <Card icon={AlertCircle} title="First-Year Sell-Through Discount">
              <p className="text-gray-400 text-sm">As a launch event, NEXTPredict has no renewal base and no historic conversion data. Forecasting must therefore stay conservative. Pipeline optimism should not be mistaken for market validation.</p>
            </Card>
            <Card icon={Target} title="Max Ceiling vs. Target Revenue">
              <p className="text-gray-400 text-sm">The B2B Partnership Maximum Revenue Ceiling is <strong className="text-[#ffcf33]">€2,889,800</strong>. This is full catalogue capacity, not the default expectation. Base market validation is <strong className="text-[#ffcf33]">€1.35M</strong>. Stretch is <strong className="text-[#ffcf33]">€1.8M</strong>.</p>
            </Card>
            <Card icon={Users} title="Buyer Density Priority">
              <p className="text-gray-400 text-sm">The target is operator / platform / institutional buyer density. Comp, hosted and partner-led passes should build the audience quality required to defend premium sponsor pricing.</p>
            </Card>
            <Card icon={Calculator} title="Model Assumptions">
              <p className="text-gray-400 text-sm">The model includes Cloakroom Area at €24,000 and all listed Stage 3 content inventory. POA, bespoke and formally unapproved upside items are excluded from the modelled ceiling.</p>
            </Card>
          </div>
        </SlideFrame>
      );
    }

    function SlideBreakEven() {
      const scenarioRows = [
        { className: "text-rose-500", cells: [
          { value: "Combined Stress Case", className: "text-rose-500" },
          { value: "€1,100,000", align: "right", className: "font-mono text-rose-500" },
          { value: "€900,000", align: "right", className: "font-mono text-rose-500" },
          { value: "€2,000,000", align: "right", className: "font-mono font-bold text-rose-500" },
          { value: "-€75,000", align: "right", className: "font-mono font-bold text-rose-500" }
        ]},
        { className: "text-rose-300", cells: [
          { value: "Downside Case", className: "text-rose-300" },
          { value: "€1,100,000", align: "right", className: "font-mono text-rose-300" },
          { value: "€1,100,000", align: "right", className: "font-mono text-rose-300" },
          { value: "€2,200,000", align: "right", className: "font-mono font-bold text-rose-300" },
          { value: "€105,000", align: "right", className: "font-mono font-bold text-emerald-400" }
        ]},
        { className: "bg-[#ffcf33]/5", cells: [
          { value: "Base Market Validation", className: "text-[#ffcf33] font-bold" },
          { value: "€1,225,000", align: "right", className: "font-mono text-[#ffcf33]" },
          { value: "€1,350,000", align: "right", className: "font-mono text-[#ffcf33]" },
          { value: "€2,575,000", align: "right", className: "font-mono font-bold text-[#ffcf33]" },
          { value: "€455,000", align: "right", className: "font-mono font-bold text-emerald-400" }
        ]},
        { cells: [
          { value: "Stretch Case", className: "text-white font-bold" },
          { value: "€1,225,000", align: "right", className: "font-mono text-gray-300" },
          { value: "€1,800,000", align: "right", className: "font-mono text-gray-300" },
          { value: "€3,025,000", align: "right", className: "font-mono font-bold text-white" },
          { value: "€860,000", align: "right", className: "font-mono font-bold text-emerald-400" }
        ]}
      ];

      return (
        <SlideFrame title="Break-Even Reality" subtitle="Establishing the financial floor and the strategic investment boundary.">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8 mb-6 flex-1">
            <Card title="The Cost Base">
              <div className="space-y-4 mb-6 md:mb-8">
                <MetricRow label="Confirmed Direct Event Cost" value="€1,535,000" />
                <MetricRow label="Salary Allocation Assumption" value="c.€450,000" valueClass="text-gray-400 italic" />
                <MetricRow label="Commission Estimate" note="10% of base B2B forecast" value="c.€135,000" valueClass="text-gray-400 italic" />
                <MetricRow label="Est. Fully-Loaded Cost Base" value="c.€2,120,000" valueClass="text-rose-400 text-lg md:text-xl" />
              </div>
              <div className="bg-[#111] p-4 rounded-xl border border-[#444] mt-auto">
                <p className="text-[11px] md:text-xs text-gray-400 leading-relaxed">
                  Salary allocation and commission treatment require Finance confirmation. For planning purposes, the fully loaded cost base is c.€2.12M at the base partnership forecast.
                </p>
              </div>
            </Card>
            <Card title="The Required Revenue Math">
              <SimpleTable
                minWidth="700px"
                headers={[
                  { label: "Scenario" },
                  { label: "Net Ticket Rev", align: "right" },
                  { label: "B2B Rev", align: "right" },
                  { label: "Total Rev", align: "right", className: "text-[#ffcf33]" },
                  { label: "Est. Margin", align: "right", className: "text-[#ffcf33]" }
                ]}
                rows={scenarioRows}
              />
              <div className="mt-4 p-3 bg-[#ffcf33]/10 border border-[#ffcf33]/30 rounded-lg">
                <p className="text-[11px] text-gray-300 leading-relaxed">
                  <strong className="text-[#ffcf33]">Loss tolerance must be agreed upfront.</strong> A controlled first-year investment loss is acceptable if it delivers audience scale, sponsor proof points, category authority and 2027 renewal potential. An unplanned loss caused by weak pipeline discipline or uncontrolled discounting is not acceptable.
                </p>
              </div>
            </Card>
          </div>
        </SlideFrame>
      );
    }

    function SlideStrategicLaunchInvestmentLogic() {
      return (
        <SlideFrame title="Strategic Launch Investment Logic" subtitle="Year one should be judged on financial control and strategic market position.">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 flex-1">
            <Card icon={TrendingDown} title="Controlled Loss vs. Accidental Loss" danger>
              <p className="text-gray-300 text-sm md:text-base leading-relaxed mb-4">
                A first-year loss is not automatically a failure. A vague, unmanaged loss is. If NEXTPredict loses money in year one, it must be because we deliberately invested in market position, not because pricing, pipeline, staffing or governance drifted.
              </p>
              <ul className="space-y-3 text-sm text-gray-300">
                <Bullet color="text-rose-400"><strong className="text-white">Acceptable:</strong> Approved launch investment with a clear ceiling, clear owner and clear strategic return.</Bullet>
                <Bullet color="text-rose-400"><strong className="text-white">Unacceptable:</strong> Loss created by uncontrolled discounting, unclear ownership, weak pipeline discipline or sales-team distraction.</Bullet>
              </ul>
            </Card>
            <Card icon={Award} title="What the Investment Buys" accent>
              <ul className="space-y-3 text-sm text-gray-300">
                <Bullet>Category authority in a forming prediction markets sector.</Bullet>
                <Bullet>Market credibility with operators, platforms, trading firms, data providers, capital and regulatory stakeholders.</Bullet>
                <Bullet>Audience scale and buyer density large enough to justify premium sponsor pricing.</Bullet>
                <Bullet>Sponsor proof points for 2027 renewal conversations.</Bullet>
                <Bullet>Media reach, content authority and owned category narrative.</Bullet>
              </ul>
            </Card>
            <Card icon={ShieldCheck} title="Core Revenue Protection">
              <p className="text-gray-400 text-sm leading-relaxed mb-4">
                NEXT.io core revenue must stay protected. Established events and products provide the commercial cushion against NEXTPredict launch volatility.
              </p>
              <div className="p-4 bg-[#111] border border-[#444] rounded-xl text-xs text-gray-400">
                NEXTPredict deserves senior focus, structured activity and escalation support. It must not become an uncontrolled drain on the sales team or a reason to weaken proven revenue streams.
              </div>
            </Card>
            <Card icon={Activity} title="Strategic Scorecard">
              <p className="text-gray-400 text-sm leading-relaxed mb-4">
                Year-one profit matters, but it is not the only success measure. The board should measure launch value through:
              </p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs text-gray-300">
                <div className="bg-[#111] border border-[#444] p-2 rounded">Sponsor calibre</div>
                <div className="bg-[#111] border border-[#444] p-2 rounded">Buyer density</div>
                <div className="bg-[#111] border border-[#444] p-2 rounded">Ticket buyer quality</div>
                <div className="bg-[#111] border border-[#444] p-2 rounded">Media/content reach</div>
                <div className="bg-[#111] border border-[#444] p-2 rounded">Renewal probability</div>
                <div className="bg-[#111] border border-[#444] p-2 rounded">2027 pipeline created</div>
              </div>
            </Card>
          </div>
        </SlideFrame>
      );
    }

    function SlideTicketing() {
      const volumeRows = [
        { cells: [{ value: "Conference Only" }, { value: "200", align: "right", className: "font-mono" }, { value: "~$999", align: "right", className: "font-mono" }, { value: "~$200,000", align: "right", className: "font-mono" }] },
        { cells: [{ value: "Full Event", className: "font-bold text-white" }, { value: "700", align: "right", className: "font-mono" }, { value: "~$1,499", align: "right", className: "font-mono" }, { value: "~$1,049,000", align: "right", className: "font-mono" }] },
        { cells: [{ value: "VIP" }, { value: "100", align: "right", className: "font-mono" }, { value: "~$2,799", align: "right", className: "font-mono" }, { value: "~$280,000", align: "right", className: "font-mono" }] },
        { className: "bg-[#111]", cells: [{ value: "Total Paid", className: "font-bold text-white uppercase text-[10px]" }, { value: "1,000", align: "right", className: "font-mono font-bold text-white" }, { value: "-", align: "right", className: "font-mono text-gray-500" }, { value: "~$1.53M", align: "right", className: "font-mono font-bold text-[#ffcf33]" }] }
      ];

      return (
        <SlideFrame title="Ticketing Model" subtitle="A structured pricing ladder balancing volume targets with premium institutional yield.">

            {[

          <main className="flex-1 flex flex-col max-w-7xl mx-auto w-full p-4 md:p-8">

          <footer className="border-t border-[#333] bg-[#111]/80 backdrop-blur-sm p-4 flex items-center justify-between sticky bottom-0 z-50">

          </footer>
        </div>

    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
