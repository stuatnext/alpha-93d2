      { name: "C-Level Event (Bespoke)", price: "€55,000", qty: "1", desc: "Fully bespoke upside / excluded from base ceiling.", isUpside: true }
    ];

    function CatalogueSlide({ title, data, totalRev, tableNote }) {
      return (
        <div className="flex-1 flex flex-col slide-enter overflow-y-auto pr-2 md:pr-4 pb-8">
          <div className="text-[10px] md:text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Appendix / Reference</div>
          <div className="flex items-center justify-between mb-4 md:mb-6">
            <h2 className="text-2xl md:text-3xl font-bold flex items-center gap-3 text-white">
              <FileText className="w-6 h-6 md:w-8 md:h-8 text-gray-500" />
              {title}
            </h2>
            <div className="bg-[#232323] border border-[#444] rounded-lg px-4 py-2 text-right">
              <div className="text-[10px] uppercase tracking-wider text-gray-400">Max Rev Ceiling</div>
              <div className="font-mono font-bold text-[#ffcf33]">{totalRev}</div>
            </div>
          </div>
          
          <div className="bg-[#232323] border border-[#444] rounded-2xl overflow-hidden flex-1 flex flex-col">
            <div className="overflow-x-auto w-full flex-1 table-container">
              <table className="w-full text-left text-[11px] md:text-sm min-w-[700px]">
                <thead className="bg-[#111] border-b border-[#444] text-gray-400 uppercase tracking-wider text-[10px]">
                  <tr>
                    <th className="p-3 md:p-4 font-medium min-w-[200px]">Inventory Item</th>
                    <th className="p-3 md:p-4 font-medium text-center">Qty</th>
                    <th className="p-3 md:p-4 font-medium">List Price</th>
                    <th className="p-3 md:p-4 font-medium min-w-[300px]">Delivery / Notes</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-[#444] text-gray-300">
                  {data.map((item, i) => {
                    if (item.isHeader) {
                      return (
                        <tr key={i} className="bg-[#1a1a1a] border-y border-[#333]">
                          <td colSpan="4" className={item.isUpside ? "p-3 font-bold text-[#ffcf33]/80 text-[10px] md:text-xs tracking-wider uppercase" : "p-3 font-bold text-white text-[10px] md:text-xs tracking-wider uppercase"}>
                            {item.title}
                          </td>
                        </tr>
                      );
                    }
                    return (
                      <tr key={i} className={item.isUpside ? "border-l-2 border-[#ffcf33]/50 bg-[#ffcf33]/5 hover:bg-[#ffcf33]/10 transition-colors opacity-80" : "hover:bg-[#111] transition-colors group"}>
                        <td className="p-3 md:p-4 font-bold text-white">{item.name}</td>
                        <td className="p-3 md:p-4 text-center font-mono text-gray-400">{item.qty}</td>
                        <td className="p-3 md:p-4 font-mono text-[#ffcf33] font-bold">{item.price}</td>
                        <td className="p-3 md:p-4 text-[10px] md:text-xs text-gray-400">{item.desc}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          {tableNote && (
            <div className="mt-4 text-[10px] text-gray-500 italic">
              {tableNote}
            </div>
          )}
        </div>
      );
    }

    // --- APP ENTRY POINT ---

    const slides = [
      SlideTitle,
      SlideExecutiveSummary,
      SlideCommercialModel,
      SlideBreakEven,
      SlideTicketing,
      SlideMarketingLedTicketing,
      SlidePartnershipCeiling,
      SlideWeightedForecast,
      SlideScorecard,
      SlideSalesRamp,
      SlideHighLevelGTMStrategy,
      SlideCommercialControls,
      SlideMarketingGovernance,
      SlideWhatMustBeTrue,
      SlideApprovalRequested,
      SlideCompetitiveContext,
      SlideCommercialThesis,
      SlideAudienceCapacity,
      SlideDealDesk,
      SlidePartnerFABs,
      SlidePricingPsychology,
      SlidePartnershipTiering,
      () => <CatalogueSlide title="Catalogue: General Branding, Utility & Rooms" data={catalogueBranding} totalRev="€1,434,800" />,
      () => <CatalogueSlide title="Catalogue: Content & Stages" data={catalogueContent} totalRev="€1,063,000" tableNote="*Room capacities are provisional and subject to final venue room-configuration confirmation." />,
      () => <CatalogueSlide title="Catalogue: NEXTworking" data={catalogueNetworking} totalRev="€400,000" tableNote="*Exclusive and non-exclusive networking inventory is mutually exclusive. The €400k NEXTworking ceiling assumes exclusive packages take priority. Non-exclusive inventory is fallback inventory only and is excluded from the modelled ceiling unless an exclusive package does not sell." />
    ];

    function App() {
      const [currentSlide, setCurrentSlide] = useState(0);

      const next = () => setCurrentSlide(s => Math.min(slides.length - 1, s + 1));
      const prev = () => setCurrentSlide(s => Math.max(0, s - 1));

      const Slide = slides[currentSlide];

      return (
        <div className="min-h-screen bg-[#111] text-gray-50 font-sans flex flex-col">
          <main className="flex-1 flex flex-col max-w-7xl mx-auto w-full p-4 md:p-8">
            <Slide key={currentSlide} /> 
          </main>
          
          <footer className="border-t border-[#333] bg-[#111]/80 backdrop-blur-sm p-4 flex items-center justify-between sticky bottom-0 z-50">
            <div className="flex items-center gap-3">
              <Globe className="w-5 h-5 md:w-6 md:h-6 text-[#ffcf33]" />
              <div className="text-[#ffcf33] text-xs md:text-sm font-medium tracking-wide">NEXTPredict 2026 Commercial Strategy</div>
            </div>
            <div className="flex items-center gap-4">
              <button
                onClick={prev}
                disabled={currentSlide === 0}
                className="p-2 rounded-full hover:bg-[#232323] text-gray-300 disabled:text-gray-700 disabled:hover:bg-transparent transition-colors"
              >
                <ChevronLeft className="w-5 h-5 md:w-6 md:h-6" />
              </button>
              <span className="text-gray-400 font-medium font-mono min-w-[3rem] text-center text-sm md:text-base">
                {currentSlide + 1} / {slides.length}
              </span>
              <button
                onClick={next}
                disabled={currentSlide === slides.length - 1}
                className="p-2 rounded-full hover:bg-[#232323] text-gray-300 disabled:text-gray-700 disabled:hover:bg-transparent transition-colors"
              >
                <ChevronRight className="w-5 h-5 md:w-6 md:h-6" />
              </button>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
